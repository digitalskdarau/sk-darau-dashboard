<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1b3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Outer hex ring -->
  <polygon points="256,48 432,152 432,360 256,464 80,360 80,152"
    fill="none" stroke="url(#hexGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Inner hex -->
  <polygon points="256,90 400,168 400,344 256,422 112,344 112,168"
    fill="none" stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner circuit dots -->
  <circle cx="256" cy="48" r="5" fill="#00ffff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="432" cy="152" r="5" fill="#a855f7" filter="url(#glow)" opacity="0.9"/>
  <circle cx="432" cy="360" r="5" fill="#2563eb" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="464" r="5" fill="#00ffff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="80" cy="360" r="5" fill="#a855f7" filter="url(#glow)" opacity="0.9"/>
  <circle cx="80" cy="152" r="5" fill="#2563eb" filter="url(#glow)" opacity="0.9"/>

  <!-- Circuit lines horizontal -->
  <line x1="112" y1="256" x2="180" y2="256" stroke="#00ffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="332" y1="256" x2="400" y2="256" stroke="#00ffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="112" y1="200" x2="150" y2="200" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="362" y1="200" x2="400" y2="200" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="112" y1="312" x2="150" y2="312" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="362" y1="312" x2="400" y2="312" stroke="#a855f7" stroke-width="1" opacity="0.3"/>

  <!-- Small circuit nodes -->
  <circle cx="180" cy="256" r="3" fill="#00ffff" opacity="0.6"/>
  <circle cx="332" cy="256" r="3" fill="#00ffff" opacity="0.6"/>
  <circle cx="150" cy="200" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="362" cy="200" r="2" fill="#a855f7" opacity="0.5"/>

  <!-- Main "D" letterform — angular/futuristic -->
  <g filter="url(#softGlow)">
    <!-- D shape: vertical bar + curved right -->
    <path d="
      M 172 160
      L 220 160
      Q 330 160 340 256
      Q 330 352 220 352
      L 172 352
      Z
      M 210 200
      L 220 200
      Q 300 200 305 256
      Q 300 312 220 312
      L 210 312
      Z
    " fill="url(#hexGrad)" fill-rule="evenodd"/>
  </g>

  <!-- Accent lines on D -->
  <line x1="172" y1="160" x2="172" y2="352" stroke="#00ffff" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="172" y1="160" x2="240" y2="160" stroke="#00ffff" stroke-width="2" opacity="0.6"/>
  <line x1="172" y1="352" x2="240" y2="352" stroke="#00ffff" stroke-width="2" opacity="0.6"/>

  <!-- Scan line overlay effect -->
  <line x1="112" y1="230" x2="400" y2="230" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <line x1="112" y1="280" x2="400" y2="280" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>

  <!-- Top right accent glow -->
  <circle cx="390" cy="122" r="20" fill="#06b6d4" opacity="0.15" filter="url(#glow)"/>
  <circle cx="390" cy="122" r="8" fill="#06b6d4" opacity="0.5"/>

  <!-- Bottom left accent glow -->
  <circle cx="122" cy="390" r="20" fill="#7c3aed" opacity="0.15" filter="url(#glow)"/>
  <circle cx="122" cy="390" r="8" fill="#7c3aed" opacity="0.5"/>
</svg>
